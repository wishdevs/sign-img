<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ETRIBE 명함 서명 생성기</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #0f1115; color: #e5e7eb; font-family: system-ui, sans-serif; }
      main { min-height: 100vh; padding: 32px; display: flex; flex-direction: column; gap: 24px; box-sizing: border-box; }
      h1 { margin: 0; font-size: 20px; }
      p.sub { margin: 0; font-size: 13px; color: #9ca3af; }
      code { background: #1f2937; padding: 1px 5px; border-radius: 4px; }

      /* 라이브 카드 렌더용 폰트 (이미지와 동일) */
      @font-face { font-family: 'Pretendard GOV'; font-style: normal; font-weight: 700; font-display: swap;
        src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/packages/pretendard-gov/dist/web/static/woff/PretendardGOV-Bold.woff') format('woff'); }
      @font-face { font-family: 'Pretendard GOV'; font-style: normal; font-weight: 600; font-display: swap;
        src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/packages/pretendard-gov/dist/web/static/woff/PretendardGOV-SemiBold.woff') format('woff'); }
      @font-face { font-family: 'Red Hat Display'; font-style: normal; font-weight: 400; font-display: swap;
        src: url('https://cdn.jsdelivr.net/npm/@fontsource/red-hat-display/files/red-hat-display-latin-400-normal.woff') format('woff'); }
      @font-face { font-family: 'Red Hat Display'; font-style: normal; font-weight: 600; font-display: swap;
        src: url('https://cdn.jsdelivr.net/npm/@fontsource/red-hat-display/files/red-hat-display-latin-600-normal.woff') format('woff'); }
      @font-face { font-family: 'Red Hat Display'; font-style: normal; font-weight: 700; font-display: swap;
        src: url('https://cdn.jsdelivr.net/npm/@fontsource/red-hat-display/files/red-hat-display-latin-700-normal.woff') format('woff'); }
    </style>
  </head>
  <body>
    <main>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <h1>명함 서명 편집기 (AWS)</h1>
        <p class="sub">왼쪽에서 텍스트를 바꾸면 오른쪽 카드가 즉시 갱신됩니다. 이미지·조각은 Lambda가 생성합니다.</p>
      </div>
      <div id="root"></div>
    </main>
    <!-- 배포 시 config.js가 window.FN_URL / window.__IMG_BASE__ 주입 -->
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
